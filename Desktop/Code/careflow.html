// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const _saved = useMemo(loadFromStorage, []);
  const [rooms, setRooms] = useState(()=>mergeRooms(_saved?.rooms));
  const [nurses, setNurses] = useState(()=>_saved?.nurses || DEFAULT_NURSES);
  const [lastSaved, setLastSaved] = useState(()=>_saved?.savedAt || null);
  const [selected, setSelected] = useState(new Set());
  const [lockedNurses, setLockedNurses] = useState(new Set()); // nurse IDs whose assignments are protected from Zap reset
  const [editingRoom, setEditingRoom] = useState(null);
  const [toast, setToast] = useState(null);
  const [newNurseName, setNewNurseName] = useState('');
  const [dragRoomIds, setDragRoomIds] = useState([]);
  const [pendingAssignment, setPendingAssignment] = useState(null);
  const [theme, setTheme] = useState(()=>localStorage.getItem('careflow_theme')||'night');
  const [zapLoading, setZapLoading] = useState(false);
  const [phoneDir,   setPhoneDir]   = useState(false);
  const [fuelMode, setFuelMode] = useState(false);
  const [feedbackStore, setFeedbackStore] = useState(() => loadFB());
  const [zapFeedbackNurses, setZapFeedbackNurses] = useState(new Set()); // Set of nurseIds awaiting per-nurse feedback
  const toastRef = useRef();
  const autoSaveRef = useRef();
  const colorIdx = useRef(_saved?.nurses?.length ?? DEFAULT_NURSES.length);

  // ── Feedback handlers (per-nurse) ─────────────────────────────────────────
  function handleFeedbackGood(nurseId) {
    setFeedbackStore(prev => {
      const weights = { ...prev.weights };
      // Nudge every weight 8% back toward 1.0 (baseline relaxation)
      Object.keys(weights).forEach(k => { weights[k] = +(weights[k] * 0.92 + 1.0 * 0.08).toFixed(3); });
      const entry = { ts: Date.now(), rating:'good', nurseId, reason:null };
      const next = { entries:[...prev.entries.slice(-99), entry], weights };
      saveFB(next); return next;
    });
    setZapFeedbackNurses(prev => { const s = new Set(prev); s.delete(nurseId); return s; });
  }
  function handleFeedbackBad(nurseId, reason) {
    setFeedbackStore(prev => {
      const weights = { ...prev.weights };
      const BOOST = 1.28, CAP = 4.0;
      if (reason === 'spread')   weights.diam        = +Math.min(weights.diam        * BOOST, CAP).toFixed(3);
      if (reason === 'load')     weights.load        = +Math.min(weights.load        * BOOST, CAP).toFixed(3);
      if (reason === 'heavy')    weights.acuity      = +Math.min(weights.acuity      * BOOST, CAP).toFixed(3);
      if (reason === 'mix')      weights.teleCluster = +Math.min(weights.teleCluster * BOOST, CAP).toFixed(3);
      if (reason === 'cluster')  weights.diam        = +Math.min(weights.diam        * BOOST * BOOST, CAP).toFixed(3);
      const entry = { ts: Date.now(), rating:'bad', nurseId, reason };
      const next = { entries:[...prev.entries.slice(-99), entry], weights };
      saveFB(next); return next;
    });
    setZapFeedbackNurses(prev => { const s = new Set(prev); s.delete(nurseId); return s; });
  }

  // Apply theme to body
  useEffect(()=>{
    document.body.dataset.theme = theme;
    localStorage.setItem('careflow_theme', theme);
  }, [theme]);

  // Auto-save
  useEffect(()=>{
    clearTimeout(autoSaveRef.current);
    autoSaveRef.current = setTimeout(()=>{
      const savedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ rooms, nurses, savedAt }));
      setLastSaved(savedAt);
    }, 800);
    return ()=>clearTimeout(autoSaveRef.current);
  }, [rooms, nurses]);

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(()=>setToast(null), 3200);
  }

  const nurseRooms = useMemo(()=>{
    const map = {};
    nurses.forEach(n=>{ map[n.id]=[]; });
    Object.values(rooms).forEach(r=>{
      if(r.nurseId && map[r.nurseId]) map[r.nurseId].push(r.id);
    });
    return map;
  }, [rooms, nurses]);

  function selectRoom(id, e) {
    if(!rooms[id].occupied) return;
    e.stopPropagation();
    setSelected(prev=>{
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }

  useEffect(()=>{
    const h = e => { if(e.key==='Escape') setSelected(new Set()); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  function handleRoomDragStart(id, e) {
    const ids = selected.has(id) ? [...selected] : [id];
    e.dataTransfer.setData('roomIds', JSON.stringify(ids));
    e.dataTransfer.effectAllowed = 'move';
    setDragRoomIds(ids);
  }

  function commitAssign(nurseId, roomIds) {
    setRooms(prev=>{ const n={...prev}; roomIds.forEach(id=>{n[id]={...n[id],nurseId};}); return n; });
    setSelected(new Set());
    setDragRoomIds([]);
    setPendingAssignment(null);
  }

  function tryAssign(nurseId, roomIds) {
    const cand = [...new Set([...(nurseRooms[nurseId]||[]),...roomIds])];
    const err = checkAssignment(nurseId, cand, rooms);
    if(err) {
      setPendingAssignment({ warning: err, onConfirm: ()=>commitAssign(nurseId, roomIds) });
    } else {
      commitAssign(nurseId, roomIds);
    }
  }

  function handleDropOnNurse(nurseId, e, toTrash) {
    const badgeRoomId = e.dataTransfer.getData('badgeRoomId');
    const fromNurseId = e.dataTransfer.getData('fromNurseId');

    if(toTrash && badgeRoomId) {
      setRooms(prev=>({...prev,[badgeRoomId]:{...prev[badgeRoomId],nurseId:null}}));
      return;
    }
    if(toTrash) return;

    if(badgeRoomId && fromNurseId) {
      if(fromNurseId===nurseId) return;
      tryAssign(nurseId, [badgeRoomId]);
      return;
    }

    const rawIds = e.dataTransfer.getData('roomIds');
    if(!rawIds) return;
    const ids = JSON.parse(rawIds);
    const conflicts = [], toAssign = [];
    for(const id of ids) {
      const room = rooms[id];
      if(!room.occupied) continue;
      if(room.nurseId && room.nurseId!==nurseId) {
        conflicts.push(`Room ${id} already assigned to ${nurses.find(n=>n.id===room.nurseId)?.name||'another nurse'}`);
        continue;
      }
      toAssign.push(id);
    }
    if(conflicts.length) showToast('⚠ '+conflicts.join(' · '));
    if(!toAssign.length) return;
    tryAssign(nurseId, toAssign);
  }

  function assignRoomToNurse(roomId, nurseId) {
    const room = rooms[roomId];
    if(!room.occupied) return;
    if(room.nurseId && room.nurseId!==nurseId) {
      showToast(`⚠ Room ${roomId} already assigned to ${nurses.find(n=>n.id===room.nurseId)?.name}`);
      return;
    }
    tryAssign(nurseId, [roomId]);
  }

  function unassignRoom(roomId) {
    setRooms(prev=>({...prev,[roomId]:{...prev[roomId],nurseId:null}}));
  }

  // ── AI Zap Assign ─────────────────────────────────────────────────────────
  function zapAssign() {
    if (!nurses.length) { showToast('⚠ Add nurses before Zap Assign'); return; }

    setZapLoading(true);

    // Small delay so the spin animation is visible
    setTimeout(() => {
      try {
        const N = nurses.length;

        // ── Snapshot rooms at the moment Zap is pressed ──────────────────
        // Rooms belonging to LOCKED nurses are preserved; all others are
        // cleared back to unassigned so the AI gets a clean slate.
        const lockedRoomIds = new Set();
        nurses.forEach(n => {
          if (lockedNurses.has(n.id)) {
            (nurseRooms[n.id] || []).forEach(id => {
              if (rooms[id]?.occupied) lockedRoomIds.add(id);
            });
          }
        });

        // Reset: strip nurseId from every occupied room NOT protected by a lock
        const resetRooms = { ...rooms };
        Object.values(resetRooms).forEach(r => {
          if (r.occupied && !lockedRoomIds.has(r.id)) {
            resetRooms[r.id] = { ...r, nurseId: null };
          }
        });

        // Sync UI immediately so the list view reflects the reset
        setRooms(resetRooms);

        // ── Acuity point value per room ──────────────────────────────────
        function roomAcuityPts(r) {
          return (r.highAcuity ? 2 : 0) + (r.isolation ? 2 : 0) + (r.totalCare ? 2 : 0);
        }

        // Nurse state: locked nurses seed with their preserved rooms;
        // unlocked nurses start empty.
        const shuffledNurses = [...nurses].sort(() => Math.random() - 0.5);
        const ns = {};
        shuffledNurses.forEach(n => {
          const isLocked = lockedNurses.has(n.id);
          const existing = isLocked
            ? (nurseRooms[n.id] || []).filter(id => resetRooms[id]?.occupied)
            : [];
          ns[n.id] = {
            nurse: n,
            rooms:          [...existing],
            teleCount:      existing.filter(id => resetRooms[id]?.type === 'TELE').length,
            medCount:       existing.filter(id => resetRooms[id]?.type !== 'TELE').length,
            haCount:        existing.filter(id => resetRooms[id]?.highAcuity).length,
            acuityPts:      existing.reduce((s, id) => s + roomAcuityPts(resetRooms[id] || {}), 0),
            isolationCount: existing.filter(id => resetRooms[id]?.isolation).length,
            totalCareCount: existing.filter(id => resetRooms[id]?.totalCare).length,
            glucoseCount:   existing.filter(id => resetRooms[id]?.glucose).length,
            dripCount:      existing.filter(id => resetRooms[id]?.drip).length,
          };
        });

        // Snapshot learned weights from feedback store
        const fbW = feedbackStore.weights;

        // All occupied rooms that are NOT locked get re-assigned
        const unassigned = Object.values(resetRooms).filter(r => r.occupied && !lockedRoomIds.has(r.id));

        // Sort rooms: heaviest acuity first — ECO mode manages its own ordering internally
        const toAssign = [...unassigned].sort((a, b) => {
          const wa = (a.isolation?4:0)+(a.highAcuity?3:0)+(a.totalCare?2:0)+(a.type==='TELE'?1:0);
          const wb = (b.isolation?4:0)+(b.highAcuity?3:0)+(b.totalCare?2:0)+(b.type==='TELE'?1:0);
          if (wa !== wb) return wb - wa;
          return Math.random() - 0.5;
        });

        // ── Proximity: diameter = max circDist between ANY two rooms ────────
        // This checks EVERY pair, not just consecutive sorted neighbors.
        // Example: {1116(17),1120(21),1124(25),1126(27)} looks fine by
        // consecutive gaps [4,4,2] but has diameter circDist(1116,1126)=10 — not ideal.
        // Example: {1105(4),1106(5),1111B(12),1123(24)} tight core at 1105/1106,
        // diameter circDist(1105,1123)=20 — heavy penalty but acuity may justify it.
        function clusterDiameter(roomIds) {
          if (roomIds.length <= 1) return 0;
          let maxD = 0;
          for (let i = 0; i < roomIds.length; i++)
            for (let j = i + 1; j < roomIds.length; j++) {
              const d = circDist(roomIds[i], roomIds[j]);
              if (d > maxD) maxD = d;
            }
          return maxD;
        }

        // Also: chain-gap = max consecutive step in sorted circular cluster.
        // Used as a secondary tiebreaker below diameter.
        function maxChainGap(roomIds) {
          if (roomIds.length <= 1) return 0;
          const N    = ROOM_IDS.length;
          const idxs = roomIds.map(id => _RIDX[id]).sort((a, b) => a - b);
          const gaps = [];
          for (let i = 0; i < idxs.length - 1; i++) gaps.push(idxs[i+1] - idxs[i]);
          gaps.push(N - idxs[idxs.length-1] + idxs[0]);
          const maxGapIdx = gaps.reduce((mi, g, i) => g > gaps[mi] ? i : mi, 0);
          const inner = gaps.filter((_, i) => i !== maxGapIdx);
          return inner.length === 0 ? 0 : Math.max(...inner);
        }

        // Diameter penalty table (index = circDist steps between farthest pair)
        //   0-5  : ideal — all rooms within a tight corridor pocket
        //   6-9  : soft stretch — acceptable when acuity forces it
        //   10-13: significant spread — "1116 too far from 1126" territory
        //   14+  : hard block — nurse would be covering too large a territory
        const DIAM_PEN = [
          0,  0,  0,  0,  0,  0,  //  0-5  ideal
         20, 45, 80,125,            //  6-9  soft stretch
        180,250,340,450,            // 10-13 significant
        ];
        const DIAM_HARD = 14; // diameter > 13 → Infinity

        // Chain-gap secondary penalty (used alongside diameter)
        const CHAIN_PEN = [0, 0, 0, 0, 0, 0, 15, 35, 65, 105, 155, 210, 275, 350];

        // Score a nurse for a candidate room (lower = better fit, Infinity = blocked)
        function score(state, room) {
          const { rooms: nRooms, teleCount, medCount, haCount,
                  acuityPts, isolationCount, totalCareCount, glucoseCount } = state;

          // ── Hard limits ──────────────────────────────────────────────────
          const capTele = teleCount > 0 || room.type === 'TELE';
          const cap     = capTele ? 4 : 5;
          if (nRooms.length + 1 > cap)               return Infinity;
          if (room.type === 'TELE' && teleCount >= 4) return Infinity;
          if (room.highAcuity     && haCount >= 2)    return Infinity;
          if (acuityPts + roomAcuityPts(room) > 6)   return Infinity;
          if (room.glucose    && glucoseCount >= 2)   return Infinity;
          if (room.totalCare  && totalCareCount >= 2) return Infinity;

          // ── Proximity hard limit: diameter > 13 → blocked ────────────────
          const projRooms = [...nRooms, room.id];
          const diam = clusterDiameter(projRooms);
          if (diam >= DIAM_HARD) return Infinity;

          // ── Soft penalties ───────────────────────────────────────────────
          let penalty = 0;
          const projAcuity = acuityPts + roomAcuityPts(room);

          // Primary: penalise large diameter — scaled by learned weight
          penalty += (diam < DIAM_PEN.length ? DIAM_PEN[diam] : 450 + (diam - 13) * 80) * fbW.diam;

          // Secondary: penalise large consecutive steps in the sorted cluster
          const gap = maxChainGap(projRooms);
          penalty += gap < CHAIN_PEN.length ? CHAIN_PEN[gap] : 350 + (gap - 13) * 60;

          // Cohesion nudge: prefer rooms near the existing cluster centroid
          if (nRooms.length > 0) {
            const minDist = Math.min(...nRooms.map(id => circDist(room.id, id)));
            penalty += minDist * 2.5;
          }

          // Soft acuity cap — scaled by learned weight
          if (projAcuity > 4) penalty += 60 * (projAcuity - 4) * fbW.acuity;

          // Isolation: strongly discourage a 2nd isolation room on same nurse
          if (room.isolation && isolationCount >= 1) penalty += 90;

          // If nurse already has isolation, discourage stacking totalCare
          if (isolationCount >= 1 && room.totalCare && totalCareCount >= 1) penalty += 70;
          if (room.isolation && totalCareCount >= 2) penalty += 70;

          // ── ECO overflow: soft type-mix discouragement ───────────────────
          // (main ECO assignment is handled by buildEcoClusters; score() is
          //  only called for rooms that overflow the dedicated-type nurses)
          if (fuelMode) {
            if (teleCount > 0 && room.type !== 'TELE') penalty += 80 * fbW.teleCluster;
            if (medCount  > 0 && room.type === 'TELE') penalty += 80 * fbW.teleCluster;
          }

          // ── Load balance — scaled by learned weight ───────────────────────
          const load = nRooms.length * 5 * fbW.load;

          // ── HA spread: discourage stacking high-acuity ───────────────────
          const haSpread = room.highAcuity ? haCount * 18 : 0;

          // ── Tele mix (normal mode) ────────────────────────────────────────
          const telePenalty = (!fuelMode && room.type === 'TELE' && teleCount >= 3) ? 15 : 0;

          // ── Random noise (different result each press) ────────────────────
          const noise = (Math.random() - 0.5) * 10;

          return load + haSpread + telePenalty + penalty + noise;
        }

        // ── Helper: apply a room assignment to a nurse state ────────────────
        function commitToState(state, room) {
          state.rooms.push(room.id);
          if (room.type === 'TELE') state.teleCount++; else state.medCount++;
          if (room.highAcuity)     state.haCount++;
          state.acuityPts      += roomAcuityPts(room);
          if (room.isolation)  state.isolationCount++;
          if (room.totalCare)  state.totalCareCount++;
          if (room.glucose)    state.glucoseCount++;
          if (room.drip)       state.dripCount++;
        }

        // ── ECO shared helpers ───────────────────────────────────────────────
        // Hard acuity / stacking limits — same rules used everywhere.
        function _ecoPasses(state, r) {
          if (r.highAcuity && state.haCount >= 2)        return false;
          if (state.acuityPts + roomAcuityPts(r) > 6)    return false;
          if (r.glucose    && state.glucoseCount    >= 2) return false;
          if (r.totalCare  && state.totalCareCount  >= 2) return false;
          if (r.drip       && state.dripCount       >= 2) return false;
          if (r.isolation  && state.isolationCount  >= 2) return false;
          return true;
        }
        // Proximity + acuity score for one candidate room (lower = better).
        // Returns Infinity if the projected cluster exceeds DIAM_HARD.
        function _ecoScore(state, r, projRooms) {
          const diam = clusterDiameter(projRooms);
          if (diam >= DIAM_HARD) return Infinity;
          let s = (diam < DIAM_PEN.length ? DIAM_PEN[diam] : 450+(diam-13)*80) * fbW.diam;
          if (state.rooms.length > 0)
            s += Math.min(...state.rooms.map(id => circDist(r.id, id))) * 20;
          s -= roomAcuityPts(r) * 14 * fbW.acuity;
          if (r.isolation && state.isolationCount >= 1)                              s += 90;
          if (state.isolationCount >= 1 && r.totalCare && state.totalCareCount >= 1) s += 70;
          if (r.isolation && state.totalCareCount >= 2)                              s += 70;
          s += (Math.random() - 0.5) * 6;
          return s;
        }

        // ── Step 2: MedSurg cluster builder (cap = 5) ───────────────────────
        // For each nurse:
        //   a) Seed with the heaviest-acuity valid room from their corridor section
        //   b) Greedily fill to 5 (proximity + acuity — no round-robin)
        // Returns { assigned:{roomId→nurseId}, overflow:[rooms not placed] }
        function buildMedClusters(medPool, medNurses) {
          if (medNurses.length === 0) return { assigned: {}, overflow: [...medPool] };
          const CAP       = 5;
          const remaining = [...medPool];
          const assigned  = {};

          const byCorr = [...remaining].sort((a, b) => _RIDX[a.id] - _RIDX[b.id]);
          const stride  = Math.ceil(byCorr.length / medNurses.length);

          for (let ni = 0; ni < medNurses.length; ni++) {
            const n = medNurses[ni], state = ns[n.id];

            // (a) Seed: heaviest valid room in this nurse's spatial section
            const section      = byCorr.slice(ni * stride, ni * stride + stride);
            const sectionAvail = section
              .filter(r => remaining.some(rem => rem.id === r.id) && _ecoPasses(state, r))
              .sort((a, b) => roomAcuityPts(b) - roomAcuityPts(a));

            if (sectionAvail.length > 0) {
              const seed = sectionAvail[Math.floor(Math.random() * Math.min(2, sectionAvail.length))];
              const idx  = remaining.findIndex(r => r.id === seed.id);
              if (idx !== -1) {
                remaining.splice(idx, 1);
                assigned[seed.id] = n.id;
                commitToState(state, seed);
              }
            }

            // (b) Greedy fill to cap
            while (state.rooms.length < CAP && remaining.length > 0) {
              let bestIdx = -1, bestScore = Infinity;
              for (let i = 0; i < remaining.length; i++) {
                const r = remaining[i];
                if (!_ecoPasses(state, r)) continue;
                const s = _ecoScore(state, r, [...state.rooms, r.id]);
                if (s < bestScore) { bestScore = s; bestIdx = i; }
              }
              if (bestIdx === -1) break;
              const room = remaining[bestIdx];
              remaining.splice(bestIdx, 1);
              assigned[room.id] = n.id;
              commitToState(state, room);
            }
          }

          return { assigned, overflow: remaining };
        }

        // ── Step 3: TELE cluster builder (cap = 4, MedSurg mixing allowed) ──
        // medOverflow = leftover MedSurg rooms injected after Step 2.
        // For each nurse:
        //   a) Seed with a TELE room from their TELE corridor section
        //      (fallback to any available TELE if section empty)
        //   b) Greedily fill to 4 — MedSurg rooms allowed but soft-penalised
        // Dynamic cap: TELE involved → 4, pure MedSurg nurse → 5
        // Returns { assigned:{roomId→nurseId}, overflow:[rooms not placed] }
        function buildTeleClusters(telePool, medOverflow, teleNurses) {
          if (teleNurses.length === 0) return { assigned: {}, overflow: [...telePool, ...medOverflow] };
          const TELE_CAP  = 4;
          const remaining = [...telePool, ...medOverflow]; // TELE first, then MedSurg
          const assigned  = {};

          // Section seeding draws only from TELE rooms
          const teleByCorr = [...telePool].sort((a, b) => _RIDX[a.id] - _RIDX[b.id]);
          const stride     = Math.max(1, Math.ceil(teleByCorr.length / teleNurses.length));

          for (let ni = 0; ni < teleNurses.length; ni++) {
            const n = teleNurses[ni], state = ns[n.id];

            // (a) Seed: heaviest valid TELE room in section; fallback to any TELE
            const section      = teleByCorr.slice(ni * stride, ni * stride + stride);
            const sectionAvail = section
              .filter(r => remaining.some(rem => rem.id === r.id) && _ecoPasses(state, r))
              .sort((a, b) => roomAcuityPts(b) - roomAcuityPts(a));
            const seedPool = sectionAvail.length > 0 ? sectionAvail :
              remaining.filter(r => r.type === 'TELE' && _ecoPasses(state, r))
                       .sort((a, b) => roomAcuityPts(b) - roomAcuityPts(a));

            if (seedPool.length > 0) {
              const seed = seedPool[Math.floor(Math.random() * Math.min(2, seedPool.length))];
              const idx  = remaining.findIndex(r => r.id === seed.id);
              if (idx !== -1) {
                remaining.splice(idx, 1);
                assigned[seed.id] = n.id;
                commitToState(state, seed);
              }
            }

            // (b) Greedy fill to TELE cap
            while (state.rooms.length < TELE_CAP && remaining.length > 0) {
              let bestIdx = -1, bestScore = Infinity;
              for (let i = 0; i < remaining.length; i++) {
                const r = remaining[i];
                if (!_ecoPasses(state, r)) continue;
                // Dynamic cap enforced per candidate
                const effectiveCap = (state.teleCount > 0 || r.type === 'TELE') ? TELE_CAP : 5;
                if (state.rooms.length >= effectiveCap) continue;
                let s = _ecoScore(state, r, [...state.rooms, r.id]);
                if (s === Infinity) continue;
                // Soft penalty for MedSurg rooms mixed into a TELE nurse's cluster
                if (r.type !== 'TELE') s += 60 * fbW.teleCluster;
                if (s < bestScore) { bestScore = s; bestIdx = i; }
              }
              if (bestIdx === -1) break;
              const room = remaining[bestIdx];
              remaining.splice(bestIdx, 1);
              assigned[room.id] = n.id;
              commitToState(state, room);
            }
          }

          return { assigned, overflow: remaining };
        }

        // ── Main assignment ──────────────────────────────────────────────────
        const newAssignments = {};

        if (fuelMode) {
          // ECO MODE — 3-step cluster assignment:
          //   Step 1: pool all MedSurg rooms → dedicate to MedSurg nurses (cap 5)
          //   Step 2: any leftover MedSurg rooms fold into TELE pool → TELE nurses (cap 4)
          //   Step 3: anything still unassigned → normal score() greedy across all nurses

          const acuityKey = r => (r.isolation?4:0)+(r.highAcuity?3:0)+(r.totalCare?2:0);

          const telePool = unassigned
            .filter(r => r.type === 'TELE')
            .sort((a,b) => acuityKey(b)-acuityKey(a) || _RIDX[a.id]-_RIDX[b.id]);
          const medPool = unassigned
            .filter(r => r.type !== 'TELE')
            .sort((a,b) => acuityKey(b)-acuityKey(a) || _RIDX[a.id]-_RIDX[b.id]);

          const unlockedNurses = shuffledNurses.filter(n => !lockedNurses.has(n.id));
          const total = telePool.length + medPool.length;
          const teleNurseCount = total > 0
            ? Math.min(Math.round(unlockedNurses.length * telePool.length / total), unlockedNurses.length)
            : 0;
          const teleNurses = unlockedNurses.slice(0, teleNurseCount);
          const medNurses  = unlockedNurses.slice(teleNurseCount);

          // Step 1→2: fill MedSurg nurses (cap 5); leftover MedSurg → TELE pool
          const medResult  = buildMedClusters(medPool, medNurses);
          Object.assign(newAssignments, medResult.assigned);

          // Step 3: fill TELE nurses (cap 4) with TELE pool + leftover MedSurg
          const teleResult = buildTeleClusters(telePool, medResult.overflow, teleNurses);
          Object.assign(newAssignments, teleResult.assigned);

          // Final safety net: anything buildTeleClusters couldn't place → score() greedy
          for (const room of teleResult.overflow) {
            let best = null, bestScore = Infinity;
            for (const state of Object.values(ns)) {
              const s = score(state, room);
              if (s < bestScore) { bestScore = s; best = state; }
            }
            if (best && bestScore < Infinity) {
              newAssignments[room.id] = best.nurse.id;
              commitToState(best, room);
            }
          }

        } else {
          // NORMAL MODE: single proximity + acuity greedy pass
          for (const room of toAssign) {
            let best = null, bestScore = Infinity;
            for (const state of Object.values(ns)) {
              const s = score(state, room);
              if (s < bestScore) { bestScore = s; best = state; }
            }
            if (best && bestScore < Infinity) {
              newAssignments[room.id] = best.nurse.id;
              commitToState(best, room);
            }
          }
        }

        const count = Object.keys(newAssignments).length;
        const skipped = unassigned.length - count;

        if (!count && !lockedRoomIds.size) {
          showToast('⚠ Nurses are at capacity — add more nurses or clear assignments first');
        } else {
          // Apply new assignments on top of the already-reset room map
          const finalRooms = { ...resetRooms };
          Object.entries(newAssignments).forEach(([id, nurseId]) => {
            finalRooms[id] = { ...finalRooms[id], nurseId };
          });
          setRooms(finalRooms);
          const lockedCount = lockedRoomIds.size;
          const msg = skipped
            ? `⚡ Assigned ${count} rooms · ${skipped} skipped (capacity)${lockedCount ? ` · ${lockedCount} locked` : ''}`
            : `⚡ Assigned ${count} room${count>1?'s':''} across ${N} nurse${N>1?'s':''}${lockedCount ? ` · ${lockedCount} locked` : ''}`;
          showToast(msg);
          setZapFeedbackNurses(new Set(nurses.map(n => n.id))); // show per-nurse feedback strips
        }
      } finally {
        setZapLoading(false);
      }
    }, 320); // 320 ms spin — user can see the animation before result lands
  }

  // Drag from the Unassigned panel — reuses the same nurse-card drop handler
  function handleUnassignedDragStart(roomId, e) {
    e.dataTransfer.setData('roomIds', JSON.stringify([roomId]));
    e.dataTransfer.effectAllowed = 'move';
    setDragRoomIds([roomId]);
  }

  function addNurse() {
    const name = newNurseName.trim() || `RN — Nurse ${nurses.length+1}`;
    const color = NURSE_COLORS[colorIdx.current % NURSE_COLORS.length];
    colorIdx.current++;
    setNurses(prev=>[...prev,{id:'n'+Date.now(),name,color}]);
    setNewNurseName('');
  }

  function deleteNurse(nurseId) {
    if(!confirm(`Delete nurse? Rooms will be unassigned.`)) return;
    setNurses(prev=>prev.filter(n=>n.id!==nurseId));
    setRooms(prev=>{ const n={...prev}; Object.keys(n).forEach(id=>{ if(n[id].nurseId===nurseId) n[id]={...n[id],nurseId:null}; }); return n; });
  }

  function removeAllRooms(nurseId) {
    setRooms(prev=>{ const n={...prev}; Object.keys(n).forEach(id=>{ if(n[id].nurseId===nurseId) n[id]={...n[id],nurseId:null}; }); return n; });
  }

  function saveRoom(updated) {
    const wasOccupied = rooms[updated.id]?.occupied;
    const becomingVacant = wasOccupied && !updated.occupied;
    // When toggling a room to vacant: clear ALL patient properties, not just nurseId
    const finalRoom = becomingVacant
      ? { ...updated,
          nurseId: null,
          foley: false, drip: false, prisoner: false, totalCare: false,
          glucose: false, highAcuity: false, sitter: false,
          discharge: false, isolation: false, restraint: false, centralLine: false }
      : updated;
    setRooms(prev => ({ ...prev, [updated.id]: finalRoom }));
    if (becomingVacant) {
      setSelected(prev => { const next = new Set(prev); next.delete(updated.id); return next; });
    }
    setEditingRoom(null);
  }

  const [unassignedAnchor, setUnassignedAnchor] = useState(null);
  const unassignedBtnRef = useRef();
  const allOccRooms  = Object.values(rooms).filter(r=>r.occupied);
  const totalOcc     = allOccRooms.length;
  const totalAsg     = allOccRooms.filter(r=>r.nurseId).length;
  const unassignedRooms = allOccRooms.filter(r=>!r.nurseId);
  const totalTele    = allOccRooms.filter(r=>r.type==='TELE').length;
  const totalSitter     = allOccRooms.filter(r=>r.sitter).length;
  const totalDischarge  = allOccRooms.filter(r=>r.discharge).length;
  const totalIsolation  = allOccRooms.filter(r=>r.isolation).length;
  const totalRestraint  = allOccRooms.filter(r=>r.restraint).length;
  const totalCentralLine = allOccRooms.filter(r=>r.centralLine).length;
  const totalFoley       = allOccRooms.filter(r=>r.foley).length;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      {/* ── Header ── */}
      <div style={{ background:'var(--bg-panel)', borderBottom:'1px solid var(--border)', padding:'9px 20px', display:'flex', alignItems:'center', gap:16, flexShrink:0, transition:'background 0.25s' }}>
        <div>
          <span style={{ fontSize:21, fontWeight:800, background:'linear-gradient(90deg,#3b82f6,#22c55e)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>CareFlow</span>
          <span style={{ fontSize:12, color:'var(--text-4)', marginLeft:8 }}>MED/TELE</span>
        </div>
        <div style={{ marginLeft:'auto', display:'flex', gap:12, fontSize:11, color:'var(--text-4)', alignItems:'center' }}>
          <span>{new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span>
          {lastSaved && (
            <span style={{ fontSize:10, color:'#22c55e', display:'flex', alignItems:'center', gap:4 }}>
              ✓ saved {new Date(lastSaved).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}
            </span>
          )}
          <button onClick={()=>setPhoneDir(true)}
            title="Hospital Phone Directory"
            style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 11px',
              borderRadius:8, border:'1px solid var(--border-sub)', background:'transparent',
              cursor:'pointer', fontSize:12, color:'var(--text-2)', fontWeight:600,
              transition:'background 0.15s' }}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg-panel)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            📞 <span>Directory</span>
          </button>
          <ThemeToggle theme={theme} onToggle={()=>setTheme(t=>t==='night'?'day':'night')}/>
          <button className="btn btn-ghost" onClick={()=>{
            setRooms(prev=>{
              const next={};
              Object.keys(prev).forEach(id=>{
                next[id]={...prev[id], occupied:true, gender:'female', type:'TELE',
                  foley:false, drip:false, prisoner:false, totalCare:false, glucose:false, highAcuity:false,
                  sitter:false, discharge:false, isolation:false,
                  restraint:false, centralLine:false, nurseId:null};
              });
              return next;
            });
            setSelected(new Set());
            setLockedNurses(new Set());
          }} style={{ fontSize:11, padding:'4px 12px', border:'1px solid var(--border-sub)' }}>
            ↺ Reset
          </button>
        </div>
      </div>

      {/* ── Main ── */}
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
        {/* Nurse panel */}
        <div className="nurse-panel" style={{ background:'var(--bg-panel)', borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', overflow:'hidden', transition:'background 0.25s' }}>
          <div style={{ padding:'12px 12px 8px', borderBottom:'1px solid var(--border)' }}>
            <div style={{ fontSize:11, fontWeight:700, color:'var(--text-4)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span>Nursing Staff</span>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <span style={{ background:'var(--btn-ghost-bg)', color:'var(--btn-ghost-tx)', borderRadius:10, padding:'1px 8px', fontSize:11, fontWeight:700, letterSpacing:0 }}>{nurses.length}</span>
                {nurses.length > 0 && (
                  <button
                    onClick={()=>{
                      if(!confirm('Delete all nurses and unassign all rooms?')) return;
                      setNurses([]);
                      setRooms(prev=>{ const n={}; Object.keys(prev).forEach(id=>{ n[id]={...prev[id],nurseId:null}; }); return n; });
                      setLockedNurses(new Set());
                    }}
                    title="Delete all nurses and unassign all rooms"
                    style={{
                      background:'rgba(239,68,68,0.12)', border:'1px solid rgba(239,68,68,0.35)',
                      color:'#f87171', borderRadius:6, padding:'2px 8px', fontSize:10, fontWeight:700,
                      cursor:'pointer', display:'flex', alignItems:'center', gap:3, transition:'background 0.15s',
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(239,68,68,0.28)'}
                    onMouseLeave={e=>e.currentTarget.style.background='rgba(239,68,68,0.12)'}
                  >🗑 Clear All</button>
                )}
              </div>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <input type="text" placeholder="Add nurse name…" value={newNurseName}
                onChange={e=>setNewNurseName(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&addNurse()}
                style={{ flex:1, fontSize:12 }}
              />
              <button className="btn btn-primary" onClick={addNurse} style={{ whiteSpace:'nowrap' }}>+ Add</button>
            </div>
          </div>

          {selected.size>0 && (
            <div style={{ padding:'6px 12px', background:'var(--sel-bar-bg)', borderBottom:'1px solid var(--sel-bar-border)', fontSize:11, color:'var(--sel-bar-text)', display:'flex', alignItems:'center', justifyContent:'space-between', transition:'background 0.25s' }}>
              <span>🔵 {selected.size} room{selected.size>1?'s':''} selected — drag to a nurse</span>
              <button className="btn btn-ghost" onClick={()=>setSelected(new Set())} style={{ fontSize:10, padding:'2px 8px' }}>Clear</button>
            </div>
          )}

          <div style={{ flex:1, overflowY:'auto', padding:12 }}>
            {nurses.length===0 && (
              <div style={{ textAlign:'center', color:'var(--text-4)', fontSize:13, marginTop:40 }}>No nurses added yet</div>
            )}
            {nurses.map(nurse=>(
              <NurseCard key={nurse.id} nurse={nurse}
                rooms={nurseRooms[nurse.id]||[]}
                allRooms={rooms}
                previewIds={dragRoomIds}
                onRemoveAll={()=>removeAllRooms(nurse.id)}
                onDrop={(e,trash)=>handleDropOnNurse(nurse.id,e,trash)}
                onRename={name=>setNurses(prev=>prev.map(n=>n.id===nurse.id?{...n,name}:n))}
                onDelete={()=>deleteNurse(nurse.id)}
                locked={lockedNurses.has(nurse.id)}
                onToggleLock={()=>setLockedNurses(prev=>{
                  const next=new Set(prev);
                  next.has(nurse.id)?next.delete(nurse.id):next.add(nurse.id);
                  return next;
                })}
                showFeedback={zapFeedbackNurses.has(nurse.id)}
                onFeedbackGood={()=>handleFeedbackGood(nurse.id)}
                onFeedbackBad={reason=>handleFeedbackBad(nurse.id, reason)}
              />
            ))}
          </div>

          <div style={{ padding:8, borderTop:'1px solid var(--border)' }}>
            <Legend/>
          </div>
        </div>

        {/* Room grid */}
        <div className="room-panel" style={{ background:'var(--bg-base)', transition:'background 0.25s' }}>
          <CorridorGrid
            allRooms={rooms}
            selected={selected}
            nurses={nurses}
            nurseRooms={nurseRooms}
            dragPreviewIds={dragRoomIds}
            onSelect={selectRoom}
            onDragStart={handleRoomDragStart}
            onDblClick={id=>setEditingRoom(rooms[id])}
            onAssignNurse={assignRoomToNurse}
            onUnassign={unassignRoom}
            onClearSelection={()=>setSelected(new Set())}
            dashStats={{
              vacant:    ROOM_IDS.length - totalOcc,
              occupied:  totalOcc,
              assigned:  totalAsg,
              unassigned: totalOcc - totalAsg,
              tele:      totalTele,
              sitter:      totalSitter,
              discharge:   totalDischarge,
              isolation:   totalIsolation,
              restraint:   totalRestraint,
              centralLine: totalCentralLine,
              foley:       totalFoley,
              foleyRooms:       allOccRooms.filter(r=>r.foley),
              sitterRooms:      allOccRooms.filter(r=>r.sitter),
              dischargeRooms:   allOccRooms.filter(r=>r.discharge),
              isolationRooms:   allOccRooms.filter(r=>r.isolation),
              centralLineRooms: allOccRooms.filter(r=>r.centralLine),
            }}
            unassignedOpen={!!unassignedAnchor}
            unassignedBtnRef={unassignedBtnRef}
            onUnassignedClick={() => setUnassignedAnchor(a => {
              if (a) return null;
              return unassignedBtnRef.current?.getBoundingClientRect() ?? null;
            })}
            onZapAssign={zapAssign}
            zapLoading={zapLoading}
            fuelMode={fuelMode}
            onToggleFuel={() => setFuelMode(f => !f)}
            fbWeights={feedbackStore.weights}
          />
        </div>
      </div>

      {unassignedAnchor && (
        <UnassignedPanel
          rooms={unassignedRooms}
          nurses={nurses}
          nurseRooms={nurseRooms}
          onAssign={assignRoomToNurse}
          onDragStart={handleUnassignedDragStart}
          onClose={()=>setUnassignedAnchor(null)}
          anchor={unassignedAnchor}
          triggerRef={unassignedBtnRef}
        />
      )}
      {editingRoom && <PatientModal room={editingRoom} onClose={()=>setEditingRoom(null)} onSave={saveRoom}/>}
      {pendingAssignment && (
        <WarningModal
          warning={pendingAssignment.warning}
          onOverride={pendingAssignment.onConfirm}
          onCancel={()=>setPendingAssignment(null)}
        />
      )}
      {phoneDir && <PhoneDirectory onClose={()=>setPhoneDir(false)}/>}
      {toast && <div className="warn-toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
